<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafío 2 - E-commerce con Grid</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <div class="ecommerce-container">
    
    <header class="navbar">
      <h1>Mi Ecommerce</h1>
    </header>

    <aside class="sidebar">
      <h2>Categorías</h2>
      <ul class="categories-list">
        <li>Perfumes <span>(13)</span></li>
        <li>Ropa <span>(21)</span></li>
        <li>Accesorios <span>(41)</span></li>
        <li>Zapatos <span>(10)</span></li>
      </ul>
    </aside>

    <main class="products-grid">
      
      <article class="product-card">
        <img src="assets/img/perfume-mykingdom.png" alt="Perfume myKingdom" class="product-img">
        <div class="product-info">
          <h3>Perfume myKingdom</h3>
          <p class="price">31.400</p>
        </div>
        <button class="btn-buy">Comprar</button>
      </article>

      <article class="product-card">
        <img src="assets/img/perfume-phantom.png" alt="Perfume Phantom" class="product-img">
        <div class="product-info">
          <h3>Perfume Phantom</h3>
          <p class="price">68.900</p>
        </div>
        <button class="btn-buy">Comprar</button>
      </article>

      <article class="product-card">
        <img src="assets/img/zapatos-docker.png" alt="Zapatos Docker" class="product-img">
        <div class="product-info">
          <h3>Zapatos Docker</h3>
          <p class="price">29.700</p>
        </div>
        <button class="btn-buy">Comprar</button>
      </article>

      <article class="product-card">
        <img src="assets/img/poleron-puma.png" alt="Poleron puma" class="product-img">
        <div class="product-info">
          <h3>Poleron puma</h3>
          <p class="price">44.700</p>
        </div>
        <button class="btn-buy">Comprar</button>
      </article>

    </main>

    <footer class="footer">
      <p>@miecommerce</p>
    </footer>

  </div>

</body>
</html>
